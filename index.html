<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>域名估值物料包生成器 v6.0.1</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --font-body: 'Satoshi', 'Inter', sans-serif;
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem; --space-16: 4rem;
  --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem;
  --radius-xl: 1rem; --radius-full: 9999px;
  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
}
[data-theme="dark"] {
  --bg: #0f0f0e; --surface: #161614; --surface-2: #1c1c1a;
  --surface-3: #232321; --border: rgba(255,255,255,0.08);
  --text: #e8e7e4; --muted: #7a7977; --faint: #44433f;
  --accent: #4f98a3; --accent-dim: rgba(79,152,163,0.12);
  --accent-glow: rgba(79,152,163,0.25);
  --gold: #e8af34; --red: #dd6974; --green: #6daa45;
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
}
[data-theme="light"] {
  --bg: #f7f6f2; --surface: #ffffff; --surface-2: #f3f0ec;
  --surface-3: #edeae5; --border: rgba(0,0,0,0.08);
  --text: #28251d; --muted: #7a7974; --faint: #bab9b4;
  --accent: #01696f; --accent-dim: rgba(1,105,111,0.08);
  --accent-glow: rgba(1,105,111,0.2);
  --gold: #d19900; --red: #a13544; --green: #437a22;
  --shadow: 0 4px 20px rgba(0,0,0,0.1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body, sans-serif);
  font-size: var(--text-base);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  transition: background var(--transition), color var(--transition);
}
img, svg { display: block; }
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }

/* ── LAYOUT ── */
.app { max-width: 860px; margin: 0 auto; padding: var(--space-8) var(--space-4); }

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--space-10);
}
.logo { display: flex; align-items: center; gap: var(--space-3); }
.logo-mark { width: 36px; height: 36px; flex-shrink: 0; }
.logo-text { font-size: var(--text-lg); font-weight: 700; letter-spacing: -0.02em; }
.logo-version {
  font-size: var(--text-xs); color: var(--muted);
  background: var(--surface-2); border: 1px solid var(--border);
  padding: 2px 8px; border-radius: var(--radius-full);
  margin-left: var(--space-2);
}
.theme-btn {
  width: 36px; height: 36px; border-radius: var(--radius-full);
  background: var(--surface-2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  transition: background var(--transition);
}
.theme-btn:hover { background: var(--surface-3); }

/* ── INPUT SECTION ── */
.input-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: var(--space-8);
  box-shadow: var(--shadow);
  margin-bottom: var(--space-8);
}
.input-label {
  font-size: var(--text-sm); color: var(--muted);
  margin-bottom: var(--space-3);
  display: flex; align-items: center; gap: var(--space-2);
}
.input-row { display: flex; gap: var(--space-3); }
.domain-input {
  flex: 1; background: var(--surface-2);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: var(--space-4) var(--space-5);
  font-size: var(--text-lg); font-weight: 700;
  color: var(--text); letter-spacing: 0.02em;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.domain-input::placeholder { color: var(--faint); font-weight: 400; }
.domain-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.analyze-btn {
  padding: var(--space-4) var(--space-8);
  background: var(--accent); color: white;
  border-radius: var(--radius-lg); font-size: var(--text-base);
  font-weight: 700; white-space: nowrap;
  transition: opacity var(--transition), transform var(--transition);
}
.analyze-btn:hover { opacity: 0.88; }
.analyze-btn:active { transform: scale(0.97); }
.analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.examples {
  margin-top: var(--space-4);
  display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap;
}
.examples-label { font-size: var(--text-xs); color: var(--faint); }
.example-chip {
  font-size: var(--text-xs); color: var(--accent);
  background: var(--accent-dim); border: 1px solid var(--accent-glow);
  padding: 3px 10px; border-radius: var(--radius-full);
  cursor: pointer; transition: background var(--transition);
}
.example-chip:hover { background: var(--accent-glow); }

/* ── RESULT SECTION ── */
#results { display: none; }
#results.visible { display: block; }

/* 4 Card Grid */
.cards-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: var(--space-4); margin-bottom: var(--space-6);
}
@media (max-width: 600px) {
  .cards-grid { grid-template-columns: 1fr; }
  .input-row { flex-direction: column; }
}
.result-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-xl); padding: var(--space-6);
  box-shadow: var(--shadow);
}
.card-label {
  font-size: var(--text-xs); color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: var(--space-3);
}
.card-value { font-size: var(--text-xl); font-weight: 700; line-height: 1.1; letter-spacing: -0.02em; }
.card-sub { font-size: var(--text-xs); color: var(--muted); margin-top: var(--space-2); }
.asset-badge {
  display: inline-flex; align-items: center;
  background: var(--accent-dim); color: var(--accent);
  border: 1px solid var(--accent-glow);
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-full);
  font-size: var(--text-sm); font-weight: 700; letter-spacing: 0.04em;
}
.score-ring { display: flex; align-items: baseline; gap: var(--space-1); }
.score-big { font-size: 3rem; font-weight: 700; color: var(--accent); }
.score-max { font-size: var(--text-sm); color: var(--faint); }
.price-tier { margin-top: var(--space-2); }
.price-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: var(--space-2) 0; border-bottom: 1px solid var(--border);
  font-size: var(--text-sm);
}
.price-row:last-child { border-bottom: none; }
.price-tier-label { color: var(--muted); }
.price-tier-val { font-weight: 700; }
.conf-bar-wrap {
  margin-top: var(--space-3); background: var(--surface-2);
  border-radius: var(--radius-full); height: 6px; overflow: hidden;
}
.conf-bar {
  height: 100%; border-radius: var(--radius-full);
  background: linear-gradient(90deg, var(--accent), var(--gold));
  transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
}

/* ── MARKDOWN PACK ── */
.pack-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-xl); overflow: hidden;
  box-shadow: var(--shadow); margin-bottom: var(--space-6);
}
.pack-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-5) var(--space-6);
  border-bottom: 1px solid var(--border); background: var(--surface-2);
}
.pack-title {
  font-size: var(--text-sm); font-weight: 700;
  display: flex; align-items: center; gap: var(--space-2);
}
.pack-title .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0;
}
.copy-btn {
  display: flex; align-items: center; gap: var(--space-2);
  font-size: var(--text-xs); font-weight: 700;
  background: var(--accent); color: white;
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-full);
  transition: opacity var(--transition);
}
.copy-btn:hover { opacity: 0.85; }
.copy-btn.copied { background: var(--green); }
.copy-btn.failed { background: var(--red); }
.pack-body {
  padding: var(--space-6);
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 0.8rem; line-height: 1.8;
  color: var(--text); white-space: pre-wrap;
  max-height: 480px; overflow-y: auto; background: var(--bg);
}

/* ── ADVANCED TOGGLE ── */
.advanced-toggle {
  display: flex; align-items: center; justify-content: center;
  gap: var(--space-2); color: var(--muted); font-size: var(--text-sm);
  cursor: pointer; padding: var(--space-4);
  border: 1px dashed var(--border); border-radius: var(--radius-lg);
  margin-bottom: var(--space-6);
  transition: color var(--transition), border-color var(--transition);
  user-select: none;
}
.advanced-toggle:hover { color: var(--accent); border-color: var(--accent); }
.advanced-toggle svg { transition: transform var(--transition); }
.advanced-toggle.open svg { transform: rotate(180deg); }
#advanced-panel { display: none; }
#advanced-panel.open { display: block; }
.advanced-inner {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-xl); padding: var(--space-6);
  margin-bottom: var(--space-6);
}
.adv-label {
  font-size: var(--text-xs); font-weight: 700;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: var(--space-4);
}
.dim-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); }
@media (max-width: 600px) { .dim-grid { grid-template-columns: 1fr 1fr; } }
.dim-item {
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: var(--space-3) var(--space-4);
}
.dim-name { font-size: var(--text-xs); color: var(--muted); margin-bottom: 4px; }
.dim-score { font-size: var(--text-lg); font-weight: 700; }
.dim-weight { font-size: var(--text-xs); color: var(--faint); }
.risk-list { margin-top: var(--space-4); }
.risk-item {
  display: flex; align-items: flex-start; gap: var(--space-2);
  font-size: var(--text-sm); color: var(--muted);
  padding: var(--space-2) 0; border-bottom: 1px solid var(--border);
}
.risk-item:last-child { border-bottom: none; }

/* ── FOOTER ── */
.footer {
  text-align: center; color: var(--faint);
  font-size: var(--text-xs); padding: var(--space-8) 0;
  border-top: 1px solid var(--border); margin-top: var(--space-8);
}

/* ── LOADER ── */
.loader { display: none; text-align: center; padding: var(--space-12); }
.loader.active { display: block; }
.loader-dots { display: inline-flex; gap: var(--space-2); }
.loader-dots span {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); display: inline-block;
  animation: bounce 1.2s ease-in-out infinite;
}
.loader-dots span:nth-child(2) { animation-delay: 0.2s; }
.loader-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}
.loader-text { margin-top: var(--space-4); color: var(--muted); font-size: var(--text-sm); }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <svg class="logo-mark" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="域名估值">
        <rect width="36" height="36" rx="10" fill="var(--accent)"/>
        <text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="white" font-family="Satoshi,sans-serif">D</text>
        <circle cx="27" cy="10" r="4" fill="var(--gold)"/>
      </svg>
      <span class="logo-text">域名估值</span>
      <span class="logo-version">v6.0.1</span>
    </div>
    <button class="theme-btn" data-theme-toggle aria-label="切换主题">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <!-- INPUT -->
  <div class="input-card">
    <div class="input-label">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      输入域名，生成可转发给 AI 的估值物料包
    </div>
    <div class="input-row">
      <input
        class="domain-input" id="domainInput"
        type="text" placeholder="例如：TEXT.COM"
        autocomplete="off" autocapitalize="off" spellcheck="false"
      />
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">生成估值包</button>
    </div>
    <div class="examples">
      <span class="examples-label">快速测试：</span>
      <span class="example-chip" onclick="fillExample('TEXT.COM')">TEXT.COM</span>
      <span class="example-chip" onclick="fillExample('Derm.com')">Derm.com</span>
      <span class="example-chip" onclick="fillExample('Excel.com')">Excel.com</span>
      <span class="example-chip" onclick="fillExample('GOKA.com')">GOKA.com</span>
      <span class="example-chip" onclick="fillExample('TEX.COM')">TEX.COM</span>
      <span class="example-chip" onclick="fillExample('MyCar.ai')">MyCar.ai</span>
    </div>
  </div>

  <!-- LOADER -->
  <div class="loader" id="loader">
    <div class="loader-dots"><span></span><span></span><span></span></div>
    <div class="loader-text">正在分析域名结构与市场数据…</div>
  </div>

  <!-- RESULTS -->
  <div id="results">

    <div class="cards-grid">
      <div class="result-card">
        <div class="card-label">资产类别</div>
        <div class="asset-badge" id="cardAssetClass">—</div>
        <div class="card-sub" id="cardAssetDesc">—</div>
      </div>
      <div class="result-card">
        <div class="card-label">综合评分</div>
        <div class="score-ring">
          <span class="score-big" id="cardScore">—</span>
          <span class="score-max">/ 100</span>
        </div>
        <div class="card-sub" id="cardScoreLabel">—</div>
      </div>
      <div class="result-card">
        <div class="card-label">三层估值</div>
        <div class="price-tier" id="cardPriceTier">—</div>
      </div>
      <div class="result-card">
        <div class="card-label">置信度</div>
        <div class="card-value" id="cardConf">—</div>
        <div class="conf-bar-wrap"><div class="conf-bar" id="confBar" style="width:0%"></div></div>
        <div class="card-sub" id="cardConfNote">—</div>
      </div>
    </div>

    <div class="pack-section">
      <div class="pack-header">
        <div class="pack-title">
          <span class="dot"></span>
          DOMAIN_VALUATION_PACK.md — 可直接转发给 AI
        </div>
        <button class="copy-btn" id="copyBtn" onclick="copyPack()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          复制全文
        </button>
      </div>
      <div class="pack-body" id="packBody">—</div>

    <div class="advanced-toggle" id="advToggle" onclick="toggleAdvanced()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12l7 7 7-7"/>
      </svg>
      高级模式：六维分数 · 风险标记 · Outbound 提示
    </div>

      <div class="advanced-inner">
        <div class="adv-label">六维评分明细</div>

  <footer class="footer">

  </footer>
</div>

<script>
// ── THEME ──
(function(){
  const btn = document.querySelector('[data-theme-toggle]');
  const html = document.documentElement;
  let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  html.setAttribute('data-theme', d);
  const icons = {
    dark: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>',
    light: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
  };
  if(btn) btn.innerHTML = icons[d === 'dark' ? 'light' : 'dark'];
  if(btn) btn.addEventListener('click', () => {
    d = d === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', d);
    btn.innerHTML = icons[d === 'dark' ? 'light' : 'dark'];
  });
})();

function fillExample(domain) {
  document.getElementById('domainInput').value = domain;
  analyze();
}

function toggleAdvanced() {
  document.getElementById('advToggle').classList.toggle('open');
  document.getElementById('advanced-panel').classList.toggle('open');
}

// ── CORE RULES v2: Asset Classification ──
const ANCHORS = {
  'cloud.com': 11000000, 'zkp.com': 5000000, 'goka.com': 399995,
  'tronscan.com': 250000, 'gunar.com': 175000, 'balaena.com': 89000,
  'vjn.com': 39000, 'farfield.com': 15000, 'travely.com': 13000, 'mycar.ai': 10000,
  'derm.com': 825000
};

// ULTRA_WORD_COM: 顶级单词/强品类词/行业核心词
// KEY FIX: TEXT must be ULTRA_WORD_COM (textile/SMS/AI-text — 3-industry cross)
const ULTRA_WORD_LIST = [
  'cloud','excel','finance','derm','text','data','code','pay','cash','buy','sell',
  'shop','store','bank','trade','fund','gold','web','net','app','tech','ai','bot',
  'news','mail','chat','call','game','play','video','music','photo','media','press',
  'market','money','loan','card','home','house','rent','land','car','auto','truck',
  'health','care','med','drug','lab','bio','gene','farm','food','cook','eat','drink',
  'hotel','travel','fly','ship','port','road','map','go','run','work','job','hire',
  'learn','edu','book','read','write','print','sign','link','share','send','file',
  'safe','lock','key','pass','id','name','brand','deal','sale','now','fast','real'
];

const ULTRA_RATIONALE = {
  'text': 'textile（纺织）/ Text Message（短信/通信）/ Text Editor & AI文本生成 — 三行业交叉核心词',
  'data': '数据行业基础词，覆盖AI/云计算/分析等所有科技领域',
  'cloud': '云计算品类词，已成交 $11,000,000',
  'excel': 'Microsoft 品类词，企业生产力核心词，战略级资产',
  'derm': '皮肤科核心词，医疗高付费力行业，已知成交约 $825,000',
  'pay': '支付行业核心词，顶级金融品类',
  'code': '编程/科技行业核心词，开发者市场',
  'market': '市场/营销核心词，电商/金融/SaaS通用',
  'trade': '贸易/金融交易核心词',
  'health': '医疗健康核心词，高付费力行业'
};

function parseDomain(raw) {
  const full = raw.trim().toLowerCase().replace(/^https?:\/\//, '').replace(/^www\./, '');
  const parts = full.split('.');
  const tld = '.' + parts.slice(1).join('.');
  const sld = parts[0];
  return { full, tld, sld };
}

function classifyAsset(sld, tld, full) {
  const key = full;
  if (ANCHORS[key]) {
    const cls = sld.length === 3 && /^[a-z]+$/.test(sld) ? 'LLL_COM' :
                ULTRA_WORD_LIST.includes(sld) ? 'ULTRA_WORD_COM' : 'VERIFIED_HIGH_VALUE_COM';
    return {
      id: cls === 'ULTRA_WORD_COM' ? 'ULTRA_WORD_COM' : 'VERIFIED_HIGH_VALUE_COM',
      priceTag: '投资人底价｜参照已知成交锚点',
      scoreFloor: cls === 'ULTRA_WORD_COM' ? 92 : 82,
      p1: '$' + (ANCHORS[key] * 0.7).toLocaleString() + ' – $' + (ANCHORS[key] * 1.5).toLocaleString(),
      p2: '$' + (ANCHORS[key] * 1.2).toLocaleString() + ' – $' + (ANCHORS[key] * 3).toLocaleString(),
      p3: '$' + (ANCHORS[key] * 2).toLocaleString() + '+',
      rationale: ULTRA_RATIONALE[sld] || ('已知成交价 $' + ANCHORS[key].toLocaleString())
    };
  }

  const len = sld.length;
  const isAlpha = /^[a-z]+$/.test(sld);
  const isNumeric = /^[0-9]+$/.test(sld);

  if (tld === '.com') {
    if (isAlpha && len === 2) return { id: 'LL_COM', priceTag: '投资人流通底价', scoreFloor: 95, p1: '$500,000 – $5,000,000+', p2: '$1,000,000 – $10,000,000', p3: '$5,000,000 – $20,000,000+', rationale: '2字母.COM — 全球最稀缺资产之一' };
    if (isAlpha && len === 3) return { id: 'LLL_COM', priceTag: '投资人流通底价', scoreFloor: 88, p1: '$100,000 – $800,000', p2: '$200,000 – $1,500,000', p3: '$500,000 – $3,000,000', rationale: '3字母.COM — 高流动性稀缺资产' };
    // FIX #2: ULTRA_WORD → LLLL_PRONOUNCEABLE → WORD_COM（修复分支顺序，防止 LLLL 可发音被 WORD_COM 吃掉）
    if (isAlpha && ULTRA_WORD_LIST.includes(sld)) return {
      id: 'ULTRA_WORD_COM', priceTag: '投资人流通底价｜⚠️ 需人工经纪复核',
      scoreFloor: 92, p1: '$500,000 – $2,000,000+', p2: '$1,000,000 – $5,000,000', p3: '$3,000,000 – $15,000,000+',
      rationale: ULTRA_RATIONALE[sld] || '顶级行业核心词，高品牌可塑性'
    };
    if (isAlpha && /[aeiou]/.test(sld) && len === 4) return { id: 'LLLL_PRONOUNCEABLE_COM', priceTag: '投资人底价', scoreFloor: 78, p1: '$8,000 – $120,000', p2: '$20,000 – $250,000', p3: '$50,000 – $500,000', rationale: '4字母可发音.COM — GOKA.com $399,995 参考' };
    if (isAlpha && len <= 8) return { id: 'WORD_COM', priceTag: '投资人流通底价', scoreFloor: 75, p1: '$15,000 – $200,000', p2: '$50,000 – $500,000', p3: '$100,000 – $1,000,000', rationale: '英文单词.COM — 普通资产' };
    if (isNumeric && len <= 5) return { id: 'SHORT_NUMERIC_COM', priceTag: '投资人流通底价', scoreFloor: 75, p1: '$1,000 – $30,000', p2: '$5,000 – $80,000', p3: '$20,000 – $200,000', rationale: '短数字.COM' };
  }
  if (tld === '.ai') return { id: 'AI_KEYWORD_TLD', priceTag: '投资人流通价', scoreFloor: 69, p1: '$1,000 – $8,000', p2: '$3,000 – $20,000', p3: '$8,000 – $50,000', rationale: '.AI 后缀域名，市场热度高' };
  return { id: 'GENERIC', priceTag: '同行参考价', scoreFloor: 0, p1: '—', p2: '—', p3: '—', rationale: '未识别为稀缺资产，建议人工复核' };
}

function score6D(sld, tld, asset) {
  const len = sld.length;
  const tldMap = { '.com': 100, '.ai': 69, '.io': 64, '.co': 60, '.net': 55, '.org': 50 };
  const d1 = tldMap[tld] || 40;
  let d2 = asset.id === 'ULTRA_WORD_COM' ? 92 : asset.id === 'LL_COM' ? 95 : asset.id === 'LLL_COM' ? 85 : asset.id === 'WORD_COM' ? 72 : asset.id === 'LLLL_PRONOUNCEABLE_COM' ? 75 : asset.id === 'AI_KEYWORD_TLD' ? 68 : 60;
  let d3 = len <= 2 ? 98 : len <= 3 ? 92 : len === 4 && /[aeiou]/.test(sld) ? 84 : len <= 4 ? 78 : len <= 6 ? 74 : len <= 8 ? 65 : 50;
  if (asset.id === 'ULTRA_WORD_COM') d3 = Math.max(d3, 88);
  let d4 = asset.id === 'VERIFIED_HIGH_VALUE_COM' ? 90 : ['ULTRA_WORD_COM','LL_COM'].includes(asset.id) ? 88 : asset.id === 'LLL_COM' ? 85 : 65;
  let d5 = tld === '.ai' ? 85 : tld === '.com' ? 80 : 60;
  if (asset.id === 'ULTRA_WORD_COM') d5 = 88;
  let d6 = ['ULTRA_WORD_COM','LL_COM'].includes(asset.id) ? 85 : asset.id === 'LLL_COM' ? 78 : 60;
  const weighted = d1*0.20 + d2*0.25 + d3*0.20 + d4*0.20 + d5*0.10 + d6*0.05;
  const final = Math.max(asset.scoreFloor || 0, Math.round(weighted));
  return { d1, d2, d3, d4, d5, d6, final };
}

function getRisks(sld, tld, asset) {
  const risks = [];
  if (asset.id === 'ULTRA_WORD_COM') {
    risks.push('⚠️ ULTRA_WORD_COM：不得机械低估，必须人工经纪复核，价格区间宽幅大');
    risks.push('📋 需人工查询 NameBio / DNJournal / Escrow / Whois / 商标库');
  }
  if (['text','excel','pay','code','market','trade'].includes(sld)) {
    risks.push('™️ 商标风险：需查询 USPTO/WIPO 是否有同名注册商标，评估侵权可能性');
  }
  if (tld !== '.com' && tld !== '.ai') risks.push('🔻 非主流后缀，流动性低于 .com，成交周期可能更长');
  if (asset.id === 'GENERIC') risks.push('⚠️ 未识别为稀缺资产类别，建议人工复核');
  if (sld.length > 8) risks.push('📏 域名较长，品牌可塑性受限，终端买家范围缩小');
  risks.push('📊 缺失：需人工确认当前持有人是否出售、是否有活跃询盘');
  return risks;
}

function getIndustries(sld) {
  const map = {
    'text': ['AI文本生成（OpenAI、Anthropic类）','SMS/短信营销平台（Twilio、SendGrid类）','文档协作SaaS（Notion、Confluence类）','纺织行业（textile缩写）','AI客服/对话系统'],
    'derm': ['皮肤科连锁诊所','医美/皮肤护理品牌','皮肤科SaaS平台'],
    'excel': ['微软生态/企业SaaS','数据分析工具','财务软件'],
    'cloud': ['云服务商（AWS/Azure类）','企业SaaS','存储/CDN服务'],
    'pay': ['支付处理商','金融科技','电商平台'],
    'code': ['开发者工具','在线IDE','编程教育'],
    'goka': ['DTC消费品牌','时尚/设计品牌','游戏/娱乐'],
    'mycar': ['汽车电商','智能汽车服务','二手车平台'],
    'vjn': ['金融','科技初创','品牌命名']
  };
  return map[sld] || ['科技/SaaS','品牌命名','企业收购'];
}

function getConfidence(asset) {
  if (['LL_COM','LLL_COM'].includes(asset.id)) return { label: '高', pct: 90, note: '稀缺资产，市场成交数据充足' };
  if (asset.id === 'ULTRA_WORD_COM') return { label: '中高', pct: 70, note: '顶级单词，价格区间宽，需人工复核' };
  if (asset.id === 'VERIFIED_HIGH_VALUE_COM') return { label: '高', pct: 88, note: '已有公开成交锚点' };
  if (asset.id === 'WORD_COM') return { label: '中', pct: 60, note: '普通单词，价格受终端买家影响大' };
  return { label: '低-中', pct: 45, note: '建议人工复核' };
}

function generatePack(parsed, asset, scores, conf, risks, industries) {
  const { sld, tld, full } = parsed;
  const now = new Date().toISOString().split('T')[0];

  // FIX #1: JSON字段 score → final_score；FIX #3: data_source_level标注static_rule_pack

    final_score: scores.final,
    score_explanation: scores.final >= 90 ? '顶级资产' : scores.final >= 80 ? '优质资产' : scores.final >= 70 ? '良好资产' : '普通域名',
    score_floor: asset.scoreFloor || 0,
    price_tag: asset.priceTag,

    price_reference: { p1_investor: asset.p1, p2_brand: asset.p2, p3_enduser: asset.p3 },
    potential_industries: industries,
    anchor_deals: ['cloud.com $11,000,000','derm.com ~$825,000','GOKA.com $399,995','VJN.com $39,000','Farfield.com $15,000'],
    missing_data: ['NameBio历史成交','Whois持有人联系状态','商标查询','当前平台挂牌价'],
    risk_flags: risks
  }, null, 2);

  return `# DOMAIN_VALUATION_PACK.md

// ── MAIN ──
let currentPack = '';

function analyze() {
  const raw = document.getElementById('domainInput').value.trim();
  if (!raw) return;
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  document.getElementById('loader').classList.add('active');
  document.getElementById('results').classList.remove('visible');

  setTimeout(() => {
    try {
      const parsed = parseDomain(raw);
      const asset = classifyAsset(parsed.sld, parsed.tld, parsed.full);
      const scores = score6D(parsed.sld, parsed.tld, asset);
      const conf = getConfidence(asset);
      const risks = getRisks(parsed.sld, parsed.tld, asset);
      const industries = getIndustries(parsed.sld);

      document.getElementById('cardAssetClass').textContent = asset.id;
      document.getElementById('cardAssetDesc').textContent = asset.rationale || asset.priceTag;
      document.getElementById('cardScore').textContent = scores.final;
      document.getElementById('cardScoreLabel').textContent = scores.final >= 90 ? '顶级资产' : scores.final >= 80 ? '优质资产' : scores.final >= 70 ? '良好资产' : '普通域名';

      document.getElementById('cardPriceTier').innerHTML = [
        { label: 'P1 投资人底价', val: asset.p1 || '—' },
        { label: 'P2 品牌资产价', val: asset.p2 || '—' },
        { label: 'P3 终端买家价', val: asset.p3 || '—' }
      ].map(r => `<div class="price-row"><span class="price-tier-label">${r.label}</span><span class="price-tier-val">${r.val}</span></div>`).join('');

      document.getElementById('cardConf').textContent = conf.label;
      document.getElementById('confBar').style.width = conf.pct + '%';
      document.getElementById('cardConfNote').textContent = conf.note;

      const pack = generatePack(parsed, asset, scores, conf, risks, industries);
      currentPack = pack;
      document.getElementById('packBody').textContent = pack;

      document.getElementById('dimGrid').innerHTML = [
        { name: 'D1 TLD强度', score: scores.d1, weight: '20%' },
        { name: 'D2 终端匹配', score: scores.d2, weight: '25%' },
        { name: 'D3 域名品质', score: scores.d3, weight: '20%' },
        { name: 'D4 市场定价', score: scores.d4, weight: '20%' },
        { name: 'D5 市场热度', score: scores.d5, weight: '10%' },
        { name: 'D6 Outbound', score: scores.d6, weight: '5%' }
      ].map(d => `<div class="dim-item"><div class="dim-name">${d.name}</div><div class="dim-score" style="color:${d.score>=85?'var(--accent)':d.score>=70?'var(--gold)':'var(--muted)'}">${d.score}</div><div class="dim-weight">权重 ${d.weight}</div></div>`).join('');

      document.getElementById('riskList').innerHTML = risks.map(r => `<div class="risk-item"><span>${r}</span></div>`).join('');

    } catch(e) { console.error(e); }

    document.getElementById('loader').classList.remove('active');
    document.getElementById('results').classList.add('visible');
    btn.disabled = false;
  }, 900);
}

// FIX #4: copyPack 增加失败兜底，不用 alert，改为按钮状态反馈
function copyPack() {
  if (!currentPack) return;
  const btn = document.getElementById('copyBtn');
  const iconCopy = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  const iconOk = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';

  navigator.clipboard.writeText(currentPack)
    .then(() => {
      btn.classList.add('copied');
      btn.innerHTML = iconOk + ' 已复制！';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = iconCopy + ' 复制全文';
      }, 2000);
    })
    .catch(() => {
      btn.classList.add('failed');
      btn.innerHTML = '⚠️ 复制失败，请手动复制';
      setTimeout(() => {
        btn.classList.remove('failed');
        btn.innerHTML = iconCopy + ' 复制全文';
      }, 3000);
    });
}

document.getElementById('domainInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});
